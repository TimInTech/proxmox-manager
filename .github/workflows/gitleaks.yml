name: gitleaks
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | sudo bash -s -- -b /usr/local/bin

      - name: Run gitleaks (workspace scan)
        run: |
          gitleaks detect --redact --source . \
            --report-format=sarif --report-path=results.sarif --exit-code=1

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif
